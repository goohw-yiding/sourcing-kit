<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E4080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1E3D;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bgGrad)" />

  <!-- Isometric Box -->
  <!-- Top face (lighter white) -->
  <polygon points="256,130 380,200 256,270 132,200" fill="rgba(255,255,255,0.95)" />

  <!-- Right face (medium white opacity) -->
  <polygon points="380,200 380,320 256,390 256,270" fill="rgba(255,255,255,0.60)" />

  <!-- Left face (darker white opacity) -->
  <polygon points="132,200 256,270 256,390 132,320" fill="rgba(255,255,255,0.35)" />

  <!-- Amber ribbon - vertical band across top face -->
  <polygon points="256,130 276,141 276,270 256,270 236,259 236,141" fill="rgba(245,158,11,0.85)" />

  <!-- Amber ribbon - vertical band on right face -->
  <polygon points="276,141 276,270 256,390 256,270 276,259" fill="rgba(180,108,0,0.80)" />

  <!-- Amber ribbon - vertical band on left face -->
  <polygon points="236,141 256,130 256,270 236,259" fill="rgba(245,158,11,0.70)" />

  <!-- "SK" text at bottom -->
  <text
    x="256"
    y="440"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="72"
    fill="white"
    text-anchor="middle"
    letter-spacing="4"
  >SK</text>
</svg>
